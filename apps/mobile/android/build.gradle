// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

def getNodeBinary = {
  def nodePath = System.getenv("NODE_BINARY")
  if (nodePath != null && !nodePath.isEmpty()) return nodePath
  
  def locations = ["/usr/local/bin/node", "/opt/homebrew/bin/node", "/usr/bin/node"]
  for (location in locations) {
    if (new File(location).exists()) return location
  }
  return "node"
}

def nodeBinary = getNodeBinary()

def reactNativeAndroidDir = new File(
  new File(providers.exec {
    workingDir(rootDir)
    commandLine(nodeBinary, "--print", "require.resolve('react-native/package.json')")
  }.standardOutput.asText.get().trim()).parentFile,
  "android"
)

allprojects {
  repositories {
    maven {
      // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
      url(reactNativeAndroidDir)
    }

    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

// Tell libraries (e.g. react-native-screens) where react-native lives so they
// don't fall back to calling `node` — which may not be on the Gradle daemon's PATH.
subprojects {
  ext.REACT_NATIVE_NODE_MODULES_DIR = reactNativeAndroidDir.parentFile.absolutePath
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"


